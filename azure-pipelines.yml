# Azure Pipelines YAML for .NET 8 Insurance Claim System

trigger:
- main

stages:
- stage: Build
  displayName: 'Build + Quality + Test'
  jobs:
  - job: BuildJob
    displayName: 'Build and analysis'
    pool:
      vmImage: 'windows-latest'
    variables:
      buildConfiguration: 'Release'
      dotnetSdkVersion: '8.x'
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET SDK $(dotnetSdkVersion)'
      inputs:
        packageType: 'sdk'
        version: '$(dotnetSdkVersion)'

    - task: DotNetCoreCLI@2
      displayName: 'Restore NuGet packages'
      inputs:
        command: 'restore'
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Build solution'
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: SonarQubePrepare@5
      displayName: 'Prepare SonarQube analysis'
      inputs:
        SonarQube: 'YourSonarQubeServiceConnection'  # Replace with your SonarQube service connection name
        scannerMode: 'MSBuild'
        projectKey: 'InsuranceClaimSystem'
        projectName: 'Insurance Claim System'
        extraProperties: |
          sonar.cs.opencover.reportsPaths=$(Agent.TempDirectory)/coverage.opencover.xml

    - task: DotNetCoreCLI@2
      displayName: 'Build with SonarQube'
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Run unit tests'
      inputs:
        command: 'test'
        projects: '**/*Tests.csproj'
        arguments: '--configuration $(buildConfiguration) --no-build --collect:"XPlat Code Coverage" --results-directory $(Agent.TempDirectory)/TestResults /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:CoverletOutput=$(Agent.TempDirectory)/coverage.opencover.xml'

    - task: PublishTestResults@2
      displayName: 'Publish test results'
      inputs:
        testResultsFiles: '**/*.trx'
        testRunTitle: 'Unit Tests'
        searchFolder: '$(Agent.TempDirectory)/TestResults'

    - task: PublishCodeCoverageResults@2
      displayName: 'Publish code coverage'
      inputs:
        summaryFileLocation: '$(Agent.TempDirectory)/TestResults/*/coverage.cobertura.xml'
        pathToSources: '$(Build.SourcesDirectory)'

    - task: SonarQubeAnalyze@5
      displayName: 'Run SonarQube analysis'

    - task: SonarQubePublish@5
      displayName: 'Publish SonarQube results'
      inputs:
        pollingTimeoutSec: '300'

    # SAST scan with Fortify
    - script: |
        echo "##[group]Fortify SAST scan"
        # Adjust Fortify commands to your environment and project settings
        sourceanalyzer -b InsuranceClaimSystem -clean
        sourceanalyzer -b InsuranceClaimSystem -scan -f $(Agent.TempDirectory)/fortify.fpr ./InsuranceClaimSystem.sln
        echo "##[endgroup]"
      displayName: 'Fortify SAST Scan'

    # SCA scan with Mend
    - script: |
        echo "##[group]Mend SCA scan"
        # Adjust to your Mend CLI path and auth configuration
        mend-cli scan --project-name "InsuranceClaimSystem" --source . --output $(Agent.TempDirectory)/mend-report.json
        echo "##[endgroup]"
      displayName: 'Mend SCA Scan'

    - task: DotNetCoreCLI@2
      displayName: 'Publish API project'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '**/InsuranceClaimSystem.API.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/API --no-build'

    - task: DotNetCoreCLI@2
      displayName: 'Publish Web project'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: '**/InsuranceClaimSystem.Web.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/Web --no-build'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish build artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: Deploy
  displayName: 'Deploy + Functional test'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeployJob
    displayName: 'Deploy artifacts'
    pool:
      vmImage: 'windows-latest'
    steps:
    - task: DownloadBuildArtifacts@0
      displayName: 'Download build artifacts'
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(Pipeline.Workspace)/drop'

    - script: |
        echo "##[group]Deploying artifact to target environment"
        # Add your actual deployment commands below (WebApp, Kubernetes, VM, etc.)
        echo "Simulated deployment step - replace with real deployment script"
        echo "##[endgroup]"
      displayName: 'Deploy to environment'

    - script: |
        echo "##[group]Functional test after deployment"
        # Replace with real API URL and assertions
        $url = 'https://your-deployed-endpoint/health'
        $response = Invoke-RestMethod -Uri $url -Method Get
        if ($response -ne 'Healthy' -and $response -ne 'OK') {
          Write-Error "Functional test failed: expected OK/Healthy, got '$response'"
          exit 1
        }
        echo "Functional test passed"
        echo "##[endgroup]"
      displayName: 'Run functional tests'
      condition: succeeded()